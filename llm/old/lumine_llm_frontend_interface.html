<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ問い合わせシステム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .logo {
            height: 60px;
            width: auto;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 0;
        }
        
        .query-section {
            margin-bottom: 30px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #555;
        }
        
        .query-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        .query-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .suggestions {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .suggestion-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .suggestion-item {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }
        
        .suggestion-item:hover {
            background: #5a6fd8;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .result-section {
            margin-bottom: 20px;
        }
        
        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-content {
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffe6e6;
            border-left-color: #e74c3c;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjQwMCIgdmlld0JveD0iMCAwIDYwMCA0MDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSI2MDAiIGhlaWdodD0iNDAwIiBmaWxsPSJ3aGl0ZSIvPgo8cGF0aCBkPSJNMjcuNCAyNTQuNEgxMDEuNlYyODBIMFYxMDBIMjcuNFYyNTQuNFoiIGZpbGw9IiMwMDhBRDQiLz4KPHA+HA 142.ODAyIDI4MEgxNzAuMjAyVjE5Mi42QzE3MC4yMDIgMTc2IDE3MC4yMDIgMTYwLjYgMTcwLjIwMiAxNDQuOEMxNzAuMjAyIDEyMC4yIDE4MS4wMDIgMTAwIDE5NS44MDIgMTAwSDIwNC4yMDJWMTI1LjRIMTk4LjIwMkMxOTQuNjAyIDEyNS40IDE5Ny44MDIgMTI5IDE5Ny44MDIgMTMzLjJWMjgwSDE3MC4yMDJIMTQyLjgwMlYyODBaIiBmaWxsPSIjMDA4QUQ0Ii8+CjxwYXRoIGQ9Ik0yMzQuNjAyIDEwMEgyNjIuMDAyVjE4Mi40SDI4My44MDJWMTAwSDMxMS4yMDJWMjgwSDI4My44MDJWMjA4SDI2Mi4wMDJWMjgwSDIzNC42MDJWMTB6IiBmaWxsPSIjMDA4QUQ0Ii8+CjxwYXRoIGQ9Ik0zNDQuNDAyIDEwMEgzNzEuODAyVjI1NC40SDM5OS4wMDJWMTAwSDQyNi40MDJWJDU IDQ4SDQ0Ny42MDJWODA wSDQ0Ny42MDJWMjgwSDQyNi40MDJWMjU0LjRIMzk5LjAwMlYyODAIM zc C0ODAyVjI1NC40SDM0NC40MDJWMTAwWiIgZmlsbD0iIzAwOEFENCIvPgo8cGF0aCBkPSJNNTI1LjYwMiAyODBIMzY4VjEwMEgzOTUuNDAyVjI1NC40SDUyNS42MDJWMjgwWiIgZmlsbD0iIzAwOEFENCIvPgo8L3N2Zz4K" alt="LUMINE Logo" class="logo">
            <h1>ルミネ - LLMシステム</h1>
        </div>
        
        <div class="query-section">
            <label for="queryInput">知りたいことを日本語で入力してください：</label>
            <textarea 
                id="queryInput" 
                class="query-input"
                placeholder="例: 2024年から今日までの会員数を調べて&#10;例: 都道府県別の売上ランキングを表示して&#10;例: 先月の売上と前年同月を比較して"
            ></textarea>
            
            <div class="suggestions">
                <div class="suggestion-title">💡 よく使われる質問例：</div>
                <div class="suggestion-item" onclick="setSuggestion('2024年から今日までの会員数を調べて')">今年の会員数</div>
                <div class="suggestion-item" onclick="setSuggestion('都道府県別のデータ件数を表示して')">都道府県別集計</div>
                <div class="suggestion-item" onclick="setSuggestion('香川県のデータを全て表示して')">香川県データ</div>
                <div class="suggestion-item" onclick="setSuggestion('最新10件のデータを表示して')">最新データ</div>
                <div class="suggestion-item" onclick="setSuggestion('メールマガジン登録者の都道府県分布を表示して')">地域分布</div>
            </div>
        </div>
        
        <button class="submit-btn" onclick="submitQuery()">🔍 データを調べる</button>
        
        <div id="results" class="results">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>データを分析中...</div>
            </div>
        </div>
    </div>

    <script>
        function setSuggestion(text) {
            document.getElementById('queryInput').value = text;
        }
        
        async function submitQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('質問を入力してください');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            const submitBtn = document.querySelector('.submit-btn');
            
            // UI状態更新
            submitBtn.disabled = true;
            submitBtn.textContent = '分析中...';
            resultsDiv.style.display = 'block';
            loadingDiv.style.display = 'block';
            
            try {
                // n8nワークフローのWebhook URLに送信
                const response = await fetch('http://localhost:5678/webhook/ask-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        timestamp: new Date().toISOString()
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                displayResults(result);
                
            } catch (error) {
                console.error('Error:', error);
                displayError('データの取得中にエラーが発生しました: ' + error.message);
            } finally {
                // UI状態リセット
                submitBtn.disabled = false;
                submitBtn.textContent = '🔍 データを調べる';
                loadingDiv.style.display = 'none';
            }
        }
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = `
                <div class="result-section">
                    <div class="result-title">📝 あなたの質問</div>
                    <div class="result-content">${data.original_query}</div>
                </div>
                
                <div class="result-section">
                    <div class="result-title">🤖 生成されたSQL</div>
                    <div class="result-content"><code>${data.generated_sql}</code></div>
                </div>
                
                <div class="result-section">
                    <div class="result-title">📊 結果の説明</div>
                    <div class="result-content">${data.explanation}</div>
                </div>
                
                <div class="result-section">
                    <div class="result-title">📈 データ</div>
                    <div class="result-content">
                        <pre>${JSON.stringify(data.results, null, 2)}</pre>
                    </div>
                </div>
            `;
        }
        
        function displayError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="result-section">
                    <div class="result-title">❌ エラー</div>
                    <div class="result-content error">${message}</div>
                </div>
            `;
        }
        
        // Enterキーでの送信
        document.getElementById('queryInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                submitQuery();
            }
        });
    </script>
</body>
</html>
